services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: binance_app_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: binance_app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

