services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: binance_app_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html

  nginx:
    image: nginx:1.27-alpine
    container_name: binance_app_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: binance_app_scheduler
    working_dir: /var/www/html
    command: ["/bin/sh", "/var/www/html/scripts/automation_scheduler.sh"]
    environment:
      AUTOMATION_HEARTBEAT_INTERVAL: "10"
      AUTOMATION_HEARTBEAT_TIMEOUT: "20"
      AUTOMATION_HEARTBEAT_URL: "http://nginx/api/automation/heartbeat"
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    depends_on:
      - nginx